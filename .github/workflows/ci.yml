name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (geo + viz + solar + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[geo,viz,solar,dev]"

      - name: Lint
        run: ruff check src tests

      - name: Test (offline only — no live services in CI)
        run: pytest -m "not network" --cov=rsgt --cov-report=term-missing
